<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .tabbar { display:flex; border-bottom:1px solid var(--border); background:var(--bg-base); }
  .tab { padding:9px 16px; font-size:13px; color:var(--fg-2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tab:hover { color:var(--fg-1); }
  .tab.active { color:var(--fg-1); border-bottom-color:var(--beam-cyan); }
  .pane { padding:16px; background:var(--bg-base); border:1px solid var(--border); border-top:none; border-radius:0 0 4px 4px; min-height:120px; }
  .pillrow { display:flex; gap:8px; margin-top:10px; }
  .pill { font-family:var(--font-mono); font-size:11px; padding:3px 8px; border-radius:2px; background:var(--bg-elev-1); color:var(--fg-2); border:1px solid var(--border); }
  .pill.rx { color:#7FD3FF; border-color:rgba(127,211,255,0.4); }
  .pill.tx { color:#FFB86C; border-color:rgba(255,184,108,0.4); }
</style>
</head><body><div class="card">
  <div class="tabbar">
    <div class="tab">Call</div>
    <div class="tab active">SIP trace</div>
    <div class="tab">Registrations</div>
  </div>
  <div class="pane">
    <div style="font-size:11px; color:var(--fg-3); text-transform:uppercase; letter-spacing:0.08em;">Filter</div>
    <div class="pillrow">
      <span class="pill rx">RX</span>
      <span class="pill tx">TX</span>
      <span class="pill">INVITE</span>
      <span class="pill">401</span>
      <span class="pill">alice@example.com</span>
    </div>
  </div>
  <div class="divider" style="margin-top:14px;"></div>
  <div class="row" style="gap:8px; flex-wrap:wrap;">
    <span class="pill" style="background:rgba(102,209,158,0.12); color:#66D19E; border-color:rgba(102,209,158,0.4);">REGISTERED</span>
    <span class="pill" style="background:rgba(127,211,255,0.12); color:#7FD3FF; border-color:rgba(127,211,255,0.4);">TRYING</span>
    <span class="pill" style="background:rgba(255,184,108,0.12); color:#FFB86C; border-color:rgba(255,184,108,0.4);">EARLY</span>
    <span class="pill" style="background:rgba(255,92,122,0.12); color:#FF5C7A; border-color:rgba(255,92,122,0.4);">DISCONNECTED 487</span>
    <span class="pill" style="background:#1F252E; color:#7C8696; border-color:var(--border);">NULL</span>
  </div>
</div></body></html>
