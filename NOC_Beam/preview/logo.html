<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:24px; align-items:center;">
    <div style="background:#0E1116; padding:20px 24px; border-radius:6px; border:1px solid var(--border);">
      <img src="../assets/logo-wordmark.svg" width="320" height="64" alt="NOC_Beam wordmark">
    </div>
    <div style="background:#0E1116; padding:16px; border-radius:6px; border:1px solid var(--border);">
      <img src="../assets/logo-mark.svg" width="80" height="80" alt="NOC_Beam mark">
    </div>
  </div>
  <div class="divider"></div>
  <div style="font-size:12px; color:#B7C0CC; line-height:1.6;">
    <strong style="color:#E6EDF3; font-weight:600;">NOC_Beam</strong> — mono "NOC" + cyan underscore + humanist "Beam" + a cyan-to-amber beam glyph. The underscore is part of the brand. App icon uses the beam alone over the deep background.
  </div>
</div></body></html>
