<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="token-label" style="margin-bottom:10px;">Signal pair — the only saturated colors in the system</div>
  <div class="row">
    <div class="swatch grow" style="background:#7FD3FF; color:#0E1116; min-height:88px;">
      <div>
        <div class="name" style="font-size:13px;">Beam Cyan</div>
        <div style="font-size:11px; opacity:0.7;">RX · primary · focus · registered</div>
      </div>
      <div class="hex">#7FD3FF</div>
    </div>
    <div class="swatch grow" style="background:#FFB86C; color:#0E1116; min-height:88px;">
      <div>
        <div class="name" style="font-size:13px;">Beam Amber</div>
        <div style="font-size:11px; opacity:0.7;">TX · secondary · DTMF · warning</div>
      </div>
      <div class="hex">#FFB86C</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="col grow">
      <div class="token-label">Cyan scale</div>
      <div class="row" style="gap:6px;">
        <div class="swatch grow" style="background:#4FAFE3; color:#0E1116; min-height:48px;"><div class="name" style="font-size:10px;">dim</div><div class="hex">#4FAFE3</div></div>
        <div class="swatch grow" style="background:#7FD3FF; color:#0E1116; min-height:48px;"><div class="name" style="font-size:10px;">base</div><div class="hex">#7FD3FF</div></div>
        <div class="swatch grow" style="background:#A8E3FF; color:#0E1116; min-height:48px;"><div class="name" style="font-size:10px;">strong</div><div class="hex">#A8E3FF</div></div>
      </div>
    </div>
    <div class="col grow">
      <div class="token-label">Amber scale</div>
      <div class="row" style="gap:6px;">
        <div class="swatch grow" style="background:#D9914A; color:#0E1116; min-height:48px;"><div class="name" style="font-size:10px;">dim</div><div class="hex">#D9914A</div></div>
        <div class="swatch grow" style="background:#FFB86C; color:#0E1116; min-height:48px;"><div class="name" style="font-size:10px;">base</div><div class="hex">#FFB86C</div></div>
        <div class="swatch grow" style="background:#FFD09B; color:#0E1116; min-height:48px;"><div class="name" style="font-size:10px;">strong</div><div class="hex">#FFD09B</div></div>
      </div>
    </div>
  </div>
</div></body></html>
