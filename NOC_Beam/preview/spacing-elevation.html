<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="token-label" style="margin-bottom:10px;">Elevation — by background step, not by shadow</div>
  <div style="background:#0E1116; padding:18px; border-radius:6px;">
    <div style="background:#161B22; padding:14px; border-radius:4px; border:1px solid #2A3340;">
      <div style="font-size:11px; color:#7C8696; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px;">bg-base · main surface</div>
      <div style="background:#1F252E; padding:12px; border-radius:4px; border:1px solid #2A3340;">
        <div style="font-size:11px; color:#7C8696; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px;">bg-elev-1 · panel</div>
        <div style="background:#2A323D; padding:10px; border-radius:4px; border:1px solid #3B4654; color:#E6EDF3; font-size:12px;">
          bg-elev-2 · hover / raised
        </div>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row" style="gap:12px;">
    <div class="grow" style="padding:12px; background:#1F252E; border:1px solid #2A3340; border-radius:4px;">
      <div style="font-size:11px; color:#7C8696; margin-bottom:4px;">default</div>
      <div style="font-size:12px; color:#E6EDF3;">1px solid #2A3340</div>
    </div>
    <div class="grow" style="padding:12px; background:#2A323D; border:1px solid #3B4654; border-radius:4px;">
      <div style="font-size:11px; color:#7C8696; margin-bottom:4px;">hover</div>
      <div style="font-size:12px; color:#E6EDF3;">1px solid #3B4654</div>
    </div>
    <div class="grow" style="padding:12px; background:#1F252E; border:1px solid #7FD3FF; border-radius:4px;">
      <div style="font-size:11px; color:#7C8696; margin-bottom:4px;">focus / active</div>
      <div style="font-size:12px; color:#E6EDF3;">1px solid #7FD3FF</div>
    </div>
  </div>
</div></body></html>
