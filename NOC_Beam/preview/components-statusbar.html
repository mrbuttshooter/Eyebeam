<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="token-label" style="margin-bottom:8px;">Status bar — fixed, persistent</div>
  <div style="background:#0E1116; border-top:1px solid var(--border); padding:6px 14px; display:flex; align-items:center; gap:14px; font-size:12px; color:var(--fg-2); border-radius:0;">
    <span style="width:8px; height:8px; border-radius:50%; background:#66D19E;"></span>
    <span><strong style="color:var(--fg-1); font-weight:500;">[Alice]</strong> registration: <span class="num-tabular">200 OK</span></span>
    <span style="flex:1;"></span>
    <span style="color:var(--fg-3);">SIP endpoint started</span>
    <span style="color:var(--fg-3);">·</span>
    <span style="font-family:var(--font-mono); color:var(--fg-3);">v0.1.0</span>
  </div>
  <div style="height:10px;"></div>
  <div style="background:#0E1116; border-top:1px solid var(--border); padding:6px 14px; display:flex; align-items:center; gap:14px; font-size:12px; color:var(--fg-2);">
    <span style="width:8px; height:8px; border-radius:50%; background:#F0C36D; animation: pulse 1.6s infinite;"></span>
    <span>Calling <span style="font-family:var(--font-mono); color:var(--fg-1);">sip:bob@example.com</span> — TRYING</span>
  </div>
  <div style="height:10px;"></div>
  <div style="background:#0E1116; border-top:1px solid #FF5C7A; padding:6px 14px; display:flex; align-items:center; gap:14px; font-size:12px; color:#FF5C7A;">
    <span style="width:8px; height:8px; border-radius:50%; background:#FF5C7A;"></span>
    <span>Endpoint error: bind 5060 failed</span>
  </div>
  <div class="divider"></div>
  <div class="token-label" style="margin-bottom:8px;">Toolbar — non-movable, top-docked</div>
  <div style="background:#0E1116; padding:6px 8px; display:flex; gap:2px; border-bottom:1px solid var(--border);">
    <button style="background:transparent; border:0; color:var(--fg-1); font-size:13px; padding:6px 12px; cursor:pointer; border-radius:2px;">Add account</button>
    <button style="background:transparent; border:0; color:var(--fg-1); font-size:13px; padding:6px 12px; cursor:pointer;">Edit account</button>
    <button style="background:transparent; border:0; color:var(--fg-1); font-size:13px; padding:6px 12px; cursor:pointer;">Remove account</button>
    <span style="width:1px; background:var(--border); margin:6px 6px;"></span>
    <button style="background:transparent; border:0; color:var(--fg-1); font-size:13px; padding:6px 12px; cursor:pointer;">Settings</button>
  </div>
</div></body></html>
