<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="token-label" style="margin-bottom:10px;">Spacing scale — 4px grid</div>
  <div class="col" style="gap:6px;">
    <div style="display:flex; align-items:center; gap:12px;"><span class="num-tabular" style="font-size:11px; color:#7C8696; width:60px;">1 · 4px</span><div style="height:8px; width:4px; background:#7FD3FF;"></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span class="num-tabular" style="font-size:11px; color:#7C8696; width:60px;">2 · 6px</span><div style="height:8px; width:6px; background:#7FD3FF;"></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span class="num-tabular" style="font-size:11px; color:#7C8696; width:60px;">3 · 8px</span><div style="height:8px; width:8px; background:#7FD3FF;"></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span class="num-tabular" style="font-size:11px; color:#7C8696; width:60px;">4 · 12px</span><div style="height:8px; width:12px; background:#7FD3FF;"></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span class="num-tabular" style="font-size:11px; color:#7C8696; width:60px;">5 · 16px</span><div style="height:8px; width:16px; background:#7FD3FF;"></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span class="num-tabular" style="font-size:11px; color:#7C8696; width:60px;">6 · 20px</span><div style="height:8px; width:20px; background:#7FD3FF;"></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span class="num-tabular" style="font-size:11px; color:#7C8696; width:60px;">7 · 24px</span><div style="height:8px; width:24px; background:#7FD3FF;"></div></div>
    <div style="display:flex; align-items:center; gap:12px;"><span class="num-tabular" style="font-size:11px; color:#7C8696; width:60px;">8 · 32px</span><div style="height:8px; width:32px; background:#7FD3FF;"></div></div>
  </div>
  <div class="divider"></div>
  <div class="token-label" style="margin-bottom:10px;">Corner radii</div>
  <div class="row" style="gap:14px; align-items:flex-end;">
    <div style="text-align:center;"><div style="width:64px; height:48px; background:#2A323D; border:1px solid #3B4654; border-radius:2px;"></div><div style="font-size:11px; color:#7C8696; margin-top:6px;">2px · inputs</div></div>
    <div style="text-align:center;"><div style="width:64px; height:48px; background:#2A323D; border:1px solid #3B4654; border-radius:4px;"></div><div style="font-size:11px; color:#7C8696; margin-top:6px;">4px · keys</div></div>
    <div style="text-align:center;"><div style="width:64px; height:48px; background:#2A323D; border:1px solid #3B4654; border-radius:6px;"></div><div style="font-size:11px; color:#7C8696; margin-top:6px;">6px · dialogs</div></div>
    <div style="text-align:center;"><div style="width:64px; height:48px; background:#2A323D; border:1px solid #3B4654; border-radius:8px;"></div><div style="font-size:11px; color:#7C8696; margin-top:6px;">8px · popovers</div></div>
  </div>
</div></body></html>
