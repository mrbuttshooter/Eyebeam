<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn {
    font-family: var(--font-ui); font-size: 13px; font-weight: 500;
    padding: 8px 14px; min-height: 32px; border-radius: 2px;
    border: 1px solid var(--border); background: var(--bg-elev-1); color: var(--fg-1);
    cursor: pointer; transition: background 80ms var(--ease-out);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:hover { background: var(--bg-elev-2); border-color: var(--border-strong); }
  .btn.primary { background: var(--beam-cyan); color: #0E1116; border-color: var(--beam-cyan); }
  .btn.primary:hover { background: var(--beam-cyan-strong); border-color: var(--beam-cyan-strong); }
  .btn.danger { background: var(--danger); color: #0E1116; border-color: var(--danger); }
  .btn.success { background: var(--success); color: #0E1116; border-color: var(--success); }
  .btn.ghost { background: transparent; }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .btn.large { min-height: 44px; padding: 10px 18px; font-size: 14px; }
  .col-label { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
</style>
</head><body><div class="card">
  <div class="row" style="gap:24px;">
    <div class="col grow">
      <div class="col-label">Default / hover / pressed / disabled</div>
      <div class="row" style="gap:8px; align-items:center;">
        <button class="btn">Edit account</button>
        <button class="btn" style="background:#2A323D; border-color:#3B4654;">Edit account</button>
        <button class="btn" style="background:#161B22;">Edit account</button>
        <button class="btn" disabled>Edit account</button>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row" style="gap:24px;">
    <div class="col">
      <div class="col-label">Primary action</div>
      <button class="btn primary large">Call</button>
    </div>
    <div class="col">
      <div class="col-label">Destructive</div>
      <button class="btn danger large">Hang up</button>
    </div>
    <div class="col">
      <div class="col-label">Affirmative</div>
      <button class="btn success large">Answer</button>
    </div>
    <div class="col">
      <div class="col-label">Ghost (toolbar)</div>
      <button class="btn ghost">+ Add account</button>
    </div>
  </div>
</div></body></html>
