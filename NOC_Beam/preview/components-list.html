<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .panel { background:var(--bg-base); border:1px solid var(--border); border-radius:4px; padding:0; overflow:hidden; max-width:380px; }
  .panel header { font-size:11px; color:var(--fg-3); text-transform:uppercase; letter-spacing:0.08em; padding:10px 14px 6px; }
  .item { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; border-top:1px solid var(--border); cursor:pointer; }
  .item:hover { background: var(--bg-elev-1); }
  .item.selected { background: rgba(127,211,255,0.08); border-left: 2px solid var(--beam-cyan); padding-left:12px; }
  .item .name { font-size:13px; color:var(--fg-1); }
  .item .meta { font-family:var(--font-mono); font-size:11px; color:var(--fg-3); }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px; vertical-align:middle; }
</style>
</head><body><div class="card">
  <div class="row" style="gap:14px; align-items:flex-start;">
    <div class="panel grow">
      <header>Accounts</header>
      <div class="item selected">
        <div><span class="dot" style="background:#66D19E;"></span><span class="name">alice@lab.example.com</span></div>
        <span class="meta">TLS</span>
      </div>
      <div class="item">
        <div><span class="dot" style="background:#66D19E;"></span><span class="name">bob@prod.example.com</span></div>
        <span class="meta">UDP</span>
      </div>
      <div class="item">
        <div><span class="dot" style="background:#F0C36D;"></span><span class="name">carol@staging</span></div>
        <span class="meta">TCP</span>
      </div>
      <div class="item">
        <div><span class="dot" style="background:#FF5C7A;"></span><span class="name">dave@offline</span></div>
        <span class="meta">UDP</span>
      </div>
      <div class="item">
        <div><span class="dot" style="background:#7C8696;"></span><span class="name">eve (disabled)</span></div>
        <span class="meta">TLS</span>
      </div>
    </div>
    <div class="col" style="flex:1; padding-top:6px;">
      <div class="token-label">Account list</div>
      <div style="font-size:12px; color:#B7C0CC; line-height:1.55;">Status dot encodes registration: <strong style="color:#66D19E;">200 OK</strong>, <strong style="color:#F0C36D;">trying</strong>, <strong style="color:#FF5C7A;">failed</strong>, muted for disabled. Transport pill on the right is mono. Selection lifts the row + adds a 2px cyan rule.</div>
    </div>
  </div>
</div></body></html>
