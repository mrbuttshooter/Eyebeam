<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row">
    <div class="swatch grow" style="background:#66D19E; color:#0E1116; min-height:72px;">
      <div><div class="name">success</div><div style="font-size:11px; opacity:0.7;">registered · CONFIRMED</div></div>
      <div class="hex">#66D19E</div>
    </div>
    <div class="swatch grow" style="background:#FF5C7A; color:#0E1116; min-height:72px;">
      <div><div class="name">danger</div><div style="font-size:11px; opacity:0.7;">hang up · 4xx · 5xx</div></div>
      <div class="hex">#FF5C7A</div>
    </div>
    <div class="swatch grow" style="background:#F0C36D; color:#0E1116; min-height:72px;">
      <div><div class="name">warning</div><div style="font-size:11px; opacity:0.7;">retry · degraded</div></div>
      <div class="hex">#F0C36D</div>
    </div>
    <div class="swatch grow" style="background:#7FD3FF; color:#0E1116; min-height:72px;">
      <div><div class="name">info</div><div style="font-size:11px; opacity:0.7;">trying · ringing</div></div>
      <div class="hex">#7FD3FF</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="grow" style="display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(102,209,158,0.12); border:1px solid #66D19E; border-radius:4px;">
      <div style="width:8px; height:8px; border-radius:50%; background:#66D19E;"></div>
      <span style="font-size:12px; color:#E6EDF3;">[Alice] registration: 200 OK</span>
    </div>
    <div class="grow" style="display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(255,92,122,0.12); border:1px solid #FF5C7A; border-radius:4px;">
      <div style="width:8px; height:8px; border-radius:50%; background:#FF5C7A;"></div>
      <span style="font-size:12px; color:#E6EDF3;">Endpoint error: bind 5060 failed</span>
    </div>
  </div>
</div></body></html>
