<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NOC_Beam · v2 shell</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============================================================
     Icon library — Lucide-style outline icons inlined as <symbol>s
     so we can <use> them anywhere. Stroke-width: 1.75.
     ============================================================ -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- phone (calls) -->
    <symbol id="i-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/>
    </symbol>
    <!-- activity (trace) -->
    <symbol id="i-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </symbol>
    <!-- clock-3 (history) -->
    <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 12"/>
    </symbol>
    <!-- users (accounts) -->
    <symbol id="i-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </symbol>
    <!-- settings -->
    <symbol id="i-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.36.16.66.43.86.76.2.33.31.71.31 1.1V12c0 .39-.11.77-.31 1.1-.2.33-.5.6-.86.76Z"/>
      <circle cx="12" cy="12" r="3"/>
    </symbol>
    <!-- phone-incoming -->
    <symbol id="i-phone-in" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 2 16 8 22 8"/>
      <line x1="23" y1="1" x2="16" y2="8"/>
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/>
    </symbol>
    <!-- phone-outgoing -->
    <symbol id="i-phone-out" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 7 23 1 17 1"/>
      <line x1="16" y1="8" x2="23" y2="1"/>
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/>
    </symbol>
    <!-- phone-missed -->
    <symbol id="i-phone-miss" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <line x1="23" y1="1" x2="17" y2="7"/>
      <line x1="17" y1="1" x2="23" y2="7"/>
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/>
    </symbol>
    <!-- phone-off (hangup) -->
    <symbol id="i-phone-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67M3 3l18 18"/>
      <path d="M8.05 3a18 18 0 0 1 1.06 4.06A2 2 0 0 1 8.66 9L7.39 10.27"/>
    </symbol>
    <!-- mic / mic-off -->
    <symbol id="i-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </symbol>
    <symbol id="i-mic-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
      <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </symbol>
    <!-- pause / play (hold) -->
    <symbol id="i-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="4" width="4" height="16"/>
      <rect x="14" y="4" width="4" height="16"/>
    </symbol>
    <!-- grid (DTMF) -->
    <symbol id="i-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </symbol>
    <!-- forward (transfer) -->
    <symbol id="i-transfer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="17 1 21 5 17 9"/>
      <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
      <polyline points="7 23 3 19 7 15"/>
      <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
    </symbol>
    <!-- record -->
    <symbol id="i-record" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <circle cx="12" cy="12" r="3" fill="currentColor"/>
    </symbol>
    <!-- plus -->
    <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </symbol>
    <!-- search -->
    <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </symbol>
    <!-- chevron-down -->
    <symbol id="i-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </symbol>
    <!-- x -->
    <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </symbol>
    <!-- panel-right (drawer toggle) -->
    <symbol id="i-panel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="15" y1="3" x2="15" y2="21"/>
    </symbol>
    <!-- check -->
    <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </symbol>
    <!-- backspace -->
    <symbol id="i-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
      <line x1="18" y1="9" x2="12" y2="15"/>
      <line x1="12" y1="9" x2="18" y2="15"/>
    </symbol>
  </defs>
</svg>

<div class="app" data-screen-label="01 Calls — idle">

  <!-- ====================================================
       TITLE BAR
       ==================================================== -->
  <div class="titlebar">
    <div class="tb-brand">
      <svg viewBox="0 0 360 72" width="160" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g font-family="'Cascadia Code', 'Cascadia Mono', ui-monospace, monospace" font-weight="600">
          <text x="8" y="50" font-size="40" fill="#E6EDF3" letter-spacing="-1">NOC</text>
          <text x="100" y="50" font-size="40" fill="#7FD3FF">_</text>
        </g>
        <g font-family="'Inter', 'Segoe UI', sans-serif" font-weight="600">
          <text x="124" y="50" font-size="40" fill="#E6EDF3" letter-spacing="-0.5">Beam</text>
        </g>
        <line x1="244" y1="32" x2="352" y2="32" stroke="#7FD3FF" stroke-width="2" stroke-linecap="round"/>
        <circle cx="352" cy="32" r="4" fill="#FFB86C"/>
      </svg>
      <span class="ver">0.1.0</span>
    </div>

    <div class="tb-account" title="Switch account">
      <span class="dot"></span>
      <span class="name">priya.r</span>
      <span class="at">@</span>
      <span class="host">sbc-east.noc.internal</span>
      <svg class="chev" viewBox="0 0 24 24" width="12" height="12"><use href="#i-chev"/></svg>
    </div>

    <label class="tb-uri">
      <span class="prompt">dial</span>
      <span class="caret">›</span>
      <input type="text" placeholder="sip:peer@host  ·  +1 555 …  ·  *97">
      <kbd>⌘K</kbd>
    </label>

    <div class="tb-winctl">
      <button>—</button>
      <button>▢</button>
      <button class="close">✕</button>
    </div>
  </div>

  <!-- ====================================================
       MAIN — rail + content + drawer
       ==================================================== -->
  <div class="main with-drawer">

    <!-- RAIL -->
    <nav class="rail">
      <div class="nav">
        <button class="rail-btn active" data-view="calls">
          <svg><use href="#i-phone"/></svg>
          <span class="lbl">Calls</span>
        </button>
        <button class="rail-btn" data-view="trace">
          <svg><use href="#i-activity"/></svg>
          <span class="lbl">Trace</span>
        </button>
        <button class="rail-btn" data-view="history">
          <svg><use href="#i-clock"/></svg>
          <span class="lbl">History</span>
          <span class="badge">3</span>
        </button>
        <button class="rail-btn" data-view="accounts">
          <svg><use href="#i-users"/></svg>
          <span class="lbl">Accounts</span>
        </button>
        <button class="rail-btn" data-view="settings">
          <svg><use href="#i-settings"/></svg>
          <span class="lbl">Settings</span>
        </button>
      </div>
      <div class="spacer"></div>
      <div class="rail-status" title="SIP registration · all accounts">
        <span class="dot"></span>
        <span class="lbl">4 / 4</span>
        <span class="sub">REGISTERED</span>
      </div>
    </nav>

    <!-- CONTENT -->
    <section class="content" id="content">

      <div class="view-header">
        <div class="title">Calls</div>
        <div class="crumbs"><span>~/calls</span></div>
        <div class="grow"></div>
        <div class="seg" id="state-picker">
          <button data-state="idle" class="on"><span class="dot"></span>Idle</button>
          <button data-state="active"><span class="dot"></span>Active</button>
          <button data-state="multi"><span class="dot"></span>Multi</button>
        </div>
        <button class="icon-btn" title="Toggle live trace" id="drawer-toggle">
          <svg><use href="#i-panel"/></svg>
        </button>
      </div>

      <div class="view-body" id="view-body">
        <!-- populated by render() -->
      </div>
    </section>

    <!-- DRAWER -->
    <aside class="drawer" id="drawer">
      <div class="drawer-head">
        <span class="title">Live trace</span>
        <span class="live"><span class="dot"></span>LIVE</span>
        <div class="grow"></div>
        <button class="icon-btn" title="Close" onclick="toggleDrawer()">
          <svg><use href="#i-x"/></svg>
        </button>
      </div>
      <div class="drawer-body" id="drawer-body">
        <!-- populated by render() -->
      </div>
    </aside>

  </div>
</div>

<!-- ====================================================
     VIEW TEMPLATES — JS swaps these into #view-body
     ==================================================== -->

<template id="tpl-idle">
  <div class="calls">
    <div class="hero">
      <div class="glyph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#i-phone"/></svg>
      </div>
      <div class="body">
        <div class="state">Ready</div>
        <h2>No active calls</h2>
        <div class="meta">
          <span><b>priya.r</b>@sbc-east.noc.internal</span>
          <span class="sep">·</span>
          <span>registered <b>00:42:18</b></span>
          <span class="sep">·</span>
          <span>codec <b>opus/48000</b></span>
        </div>
      </div>
      <div class="hero-actions">
        <button class="btn-secondary" title="Voicemail (3)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="6" cy="14" r="4" stroke-width="1.75"/>
            <circle cx="18" cy="14" r="4" stroke-width="1.75"/>
            <line x1="6" y1="18" x2="18" y2="18" stroke-width="1.75"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="pane">
      <div class="pane-head">
        <span class="title">Dialer</span>
      </div>
      <div class="pane-body">
        <div class="dialer">
          <label class="dialer-entry">
            <span class="prefix">sip:</span>
            <input type="text" placeholder="peer@host  ·  number" value="1503">
            <svg class="clear" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><use href="#i-back"/></svg>
          </label>
          <div class="keypad">
            <button class="key"><span class="num">1</span><span class="sub">&nbsp;</span></button>
            <button class="key"><span class="num">2</span><span class="sub">ABC</span></button>
            <button class="key"><span class="num">3</span><span class="sub">DEF</span></button>
            <button class="key"><span class="num">4</span><span class="sub">GHI</span></button>
            <button class="key"><span class="num">5</span><span class="sub">JKL</span></button>
            <button class="key"><span class="num">6</span><span class="sub">MNO</span></button>
            <button class="key"><span class="num">7</span><span class="sub">PQRS</span></button>
            <button class="key"><span class="num">8</span><span class="sub">TUV</span></button>
            <button class="key"><span class="num">9</span><span class="sub">WXYZ</span></button>
            <button class="key"><span class="num">∗</span><span class="sub">&nbsp;</span></button>
            <button class="key"><span class="num">0</span><span class="sub">+</span></button>
            <button class="key"><span class="num">#</span><span class="sub">&nbsp;</span></button>
          </div>
          <div class="call-row">
            <button class="btn-call">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#i-phone"/></svg>
              Call
            </button>
            <button class="btn-secondary" title="Add to contacts">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#i-plus"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="pane">
      <div class="pane-head">
        <span class="title">Recent</span>
        <div class="actions">
          <button class="icon-btn" title="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#i-search"/></svg>
          </button>
        </div>
      </div>
      <div class="pane-body" id="recent-list">
        <div class="recent-section">Today</div>

        <div class="recent-row">
          <span class="dir miss"><svg fill="none" stroke="currentColor"><use href="#i-phone-miss"/></svg></span>
          <div class="peer">
            <span class="name">Marcus Lin</span>
            <span class="uri">sip:marcus@lab.noc.internal</span>
          </div>
          <span class="dur">missed</span>
          <span class="time">14:22</span>
        </div>
        <div class="recent-row">
          <span class="dir out"><svg fill="none" stroke="currentColor"><use href="#i-phone-out"/></svg></span>
          <div class="peer">
            <span class="name">SBC East · echo test</span>
            <span class="uri">sip:*97@sbc-east.noc.internal</span>
          </div>
          <span class="dur">02:14</span>
          <span class="time">13:08</span>
        </div>
        <div class="recent-row">
          <span class="dir"><svg fill="none" stroke="currentColor"><use href="#i-phone-in"/></svg></span>
          <div class="peer">
            <span class="name">Nadia Cole</span>
            <span class="uri">sip:nadia@noc.internal</span>
          </div>
          <span class="dur">08:41</span>
          <span class="time">11:55</span>
        </div>

        <div class="recent-section">Yesterday</div>

        <div class="recent-row">
          <span class="dir out"><svg fill="none" stroke="currentColor"><use href="#i-phone-out"/></svg></span>
          <div class="peer">
            <span class="name">PagerDuty bridge</span>
            <span class="uri">sip:bridge-482@pd.noc.internal</span>
          </div>
          <span class="dur">21:09</span>
          <span class="time">22:14</span>
        </div>
        <div class="recent-row">
          <span class="dir"><svg fill="none" stroke="currentColor"><use href="#i-phone-in"/></svg></span>
          <div class="peer">
            <span class="name">Priya R.</span>
            <span class="uri">sip:priya@voice-infra.noc.internal</span>
          </div>
          <span class="dur">12:34</span>
          <span class="time">17:22</span>
        </div>
        <div class="recent-row">
          <span class="dir out"><svg fill="none" stroke="currentColor"><use href="#i-phone-out"/></svg></span>
          <div class="peer">
            <span class="name">+1 (415) 555-0142</span>
            <span class="uri">sip:14155550142@trunk-pstn.noc.internal</span>
          </div>
          <span class="dur">00:18</span>

        </div>
      </div>

  </div>
</template>

<template id="tpl-active">
  <div class="active-call">
    <div class="call-card">
      <div class="head">
        <div class="avatar">ML</div>
        <div class="who">
          <div class="label">● On call</div>
          <div class="name">Marcus Lin</div>
          <div class="uri">sip:marcus@lab.noc.internal · TLS · SRTP (AES-CM-128)</div>
        </div>
        <div class="timer">00:04:38</div>
      </div>

      <div class="call-stats">
        <div class="stat"><div class="k">Codec</div><div class="v">opus/48000/2</div></div>
        <div class="stat"><div class="k">Bit-rate</div><div class="v">38<span class="unit"> kbps</span></div></div>
        <div class="stat"><div class="k">Jitter</div><div class="v">3.2<span class="unit"> ms</span></div></div>
        <div class="stat"><div class="k">Pkt loss</div><div class="v warn">0.4<span class="unit"> %</span></div></div>
      </div>

      <div class="call-actions">
        <button class="call-action on">
          <svg fill="none" stroke="currentColor"><use href="#i-mic"/></svg>
          <span class="lbl">Mic on</span>
        </button>
        <button class="call-action">
          <svg fill="none" stroke="currentColor"><use href="#i-pause"/></svg>
          <span class="lbl">Hold</span>
        </button>
        <button class="call-action">
          <svg fill="none" stroke="currentColor"><use href="#i-grid"/></svg>
          <span class="lbl">DTMF</span>
        </button>
        <button class="call-action">
          <svg fill="none" stroke="currentColor"><use href="#i-transfer"/></svg>
          <span class="lbl">Transfer</span>
        </button>
        <button class="call-action">
          <svg fill="none" stroke="currentColor"><use href="#i-record"/></svg>
          <span class="lbl">Record</span>
        </button>
        <button class="hangup">
          <svg fill="none" stroke="currentColor"><use href="#i-phone-off"/></svg>
          <span class="lbl">End</span>
        </button>

<script>
const STATES = ['idle', 'active', 'multi'];
const LABELS = {
  idle:   '01 Calls — idle',
  active: '02 Calls — active',
  multi:  '03 Calls — multi',
};

const TITLES = {
  idle:   'Calls',
  active: 'On call · Marcus Lin',
  multi:  'On call · 2 calls',
};

let drawerOpen = true;

function render(state) {
  const tpl = document.getElementById('tpl-' + state);
  const body = document.getElementById('view-body');
  body.innerHTML = '';
  body.appendChild(tpl.content.cloneNode(true));

  // Drawer always shows the trace template
  const drawerBody = document.getElementById('drawer-body');
  drawerBody.innerHTML = '';
  drawerBody.appendChild(document.getElementById('tpl-trace').content.cloneNode(true));

  // Update header title + screen label
  document.querySelector('.view-header .title').textContent = TITLES[state];
  document.querySelector('.app').dataset.screenLabel = LABELS[state];

  // Drawer is most useful with an active/multi call; auto-open
  if (state !== 'idle') setDrawer(true);
}

function setDrawer(open) {
  drawerOpen = open;
  document.querySelector('.main').classList.toggle('with-drawer', open);
  document.getElementById('drawer').style.display = open ? '' : 'none';
}

function toggleDrawer() { setDrawer(!drawerOpen); }

document.getElementById('drawer-toggle').addEventListener('click', toggleDrawer);

document.getElementById('state-picker').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-state]');
  if (!btn) return;
  document.querySelectorAll('#state-picker button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render(btn.dataset.state);
});

// Rail buttons just visually activate (other views are separate files)
document.querySelectorAll('.rail-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const view = btn.dataset.view;
    const routes = {
      calls: 'index.html',
      settings: 'settings.html',
    };
    if (routes[view]) {
      window.location.href = routes[view];
    } else {
      // visually mark active for unimplemented views
      document.querySelectorAll('.rail-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  });
});

render('idle');
</script>
