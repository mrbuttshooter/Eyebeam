name: Build NOC_Beam Windows EXE

on:
  push:
    branches:
      - claude/eyebeam-sip-testing-j5qRA
      - claude/debug-error-Dlc4I
      - main
    paths:
      - 'python-app/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        type: choice
        options:
          - ui-only
          - full
        default: full

env:
  PJSIP_TAG: "2.14.1"
  OPENSSL_TAG: "openssl-3.0.13"
  PYTHON_VERSION: "3.11"
  # ui-only: PyInstaller only, no PJSIP native build (~5 min, calls disabled).
  # full:    builds OpenSSL + BCG729 + PJSIP + pjsua2 binding (~45 min).
  # TEMPORARILY defaulted to 'full' to validate the native pipeline end-to-end.
  # Flip back to 'ui-only' once the full build is confirmed green.
  BUILD_MODE: ${{ github.event.inputs.build_mode || 'full' }}

jobs:
  # ------------------------------------------------------------------
  # Unit tests (fast — no native build needed)
  # ------------------------------------------------------------------
  test:
    name: Tests (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: python-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v

  # ------------------------------------------------------------------
  # Native build (PJSIP + OpenSSL + BCG729) + PyInstaller
  # ------------------------------------------------------------------
  build:
    name: Build NOC_Beam.exe
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: python-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Enable MSVC x64 environment
        if: env.BUILD_MODE == 'full'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install build tools (NASM, SWIG, Strawberry Perl)
        if: env.BUILD_MODE == 'full'
        shell: pwsh
        run: |
          choco install -y --no-progress nasm swig strawberryperl
          # Make sure NASM and SWIG are on PATH for subsequent steps
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\ProgramData\chocolatey\lib\swig\tools\swigwin-*" | ForEach-Object {
            $p = Resolve-Path $_ -ErrorAction SilentlyContinue
            if ($p) { $p.Path | Out-File -FilePath $env:GITHUB_PATH -Append }
          }

      - name: Verify toolchain
        if: env.BUILD_MODE == 'full'
        run: |
          Write-Host "=== cl.exe ==="
          cl 2>&1 | Select-Object -First 1
          Write-Host "=== python ==="
          python --version
          Write-Host "=== swig ==="
          swig -version
          Write-Host "=== nasm ==="
          nasm -v
          Write-Host "=== perl ==="
          perl --version | Select-Object -First 2
          Write-Host "=== cmake ==="
          cmake --version | Select-Object -First 1

      - name: Cache native dependencies
        if: env.BUILD_MODE == 'full'
        id: cache-native
        uses: actions/cache@v4
        with:
          path: |
            python-app/third_party/openssl-install
            python-app/third_party/bcg729-install
            python-app/third_party/opus-install
            python-app/src/noc_beam/_native
          key: native-${{ runner.os }}-${{ env.PJSIP_TAG }}-${{ env.OPENSSL_TAG }}-v5-${{ hashFiles('python-app/build/build_windows.ps1') }}

      - name: Build EXE with shared Windows build script
        run: |
          $python = (Get-Command python).Source
          $args = @("-PythonExe", $python)
          if ($env:BUILD_MODE -ne "full") {
            $args += "-SkipNativeBuild"
            $args += "-SkipPackagedSmoke"
          }
          powershell -ExecutionPolicy Bypass -File .\build\build_windows.ps1 @args
          if (-not (Test-Path dist\NOC_Beam.exe)) {
            throw "PyInstaller did not produce dist\NOC_Beam.exe"
          }
          $size = [math]::Round((Get-Item dist\NOC_Beam.exe).Length / 1MB, 1)
          Write-Host "Built NOC_Beam.exe ($size MB)"

      - name: Verify packaged native SIP smoke report
        if: env.BUILD_MODE == 'full'
        run: |
          $smoke = "build\sip-smoke.json"
          if (-not (Test-Path $smoke)) {
            throw "Missing packaged SIP smoke report: $smoke"
          }
          $json = Get-Content -Raw -Path $smoke | ConvertFrom-Json
          $json | ConvertTo-Json -Depth 6
          if (-not $json.ok) { throw "Packaged SIP smoke was not ok" }
          if ($json.source -ne "native") { throw "Expected native pjsua2, got $($json.source)" }
          if (-not $json.endpoint_created -or -not $json.endpoint_destroyed) {
            throw "Packaged SIP smoke did not create and destroy an endpoint"
          }
          if (-not $json.lib_initialized -or -not $json.lib_started) {
            throw "Packaged SIP smoke did not initialize and start PJSIP"
          }
          foreach ($transport in @("udp", "tcp", "tls")) {
            if (-not $json.transports.$transport.ok) {
              throw "Packaged SIP smoke transport '$transport' failed"
            }
          }
          foreach ($codec in @("g729", "opus")) {
            if (-not $json.required_codecs.$codec) {
              throw "Packaged SIP smoke did not find required codec '$codec'"
            }
          }
          if (-not $json.pjsip_version) {
            throw "Packaged SIP smoke did not report PJSIP version"
          }

      # ---------------- Artifact ----------------
      - name: Upload NOC_Beam.exe
        uses: actions/upload-artifact@v4
        with:
          name: NOC_Beam-windows-x64-${{ env.BUILD_MODE }}
          path: |
            python-app/dist/NOC_Beam.exe
            python-app/dist/NOC_Beam.exe.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            python-app/third_party/pjproject/build/output/**/*.log
            python-app/third_party/*.log
            python-app/third_party/pjproject/**/msbuild-*.log
            python-app/msbuild-pjsip.log
          if-no-files-found: ignore
